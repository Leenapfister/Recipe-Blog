<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews from students</title>
    <style type="text/css" media="all">
        @import "css/master.css";
    </style>
</head>
<body>

<div class="container">
    
    <header class="header-section">
        <h1>Student Reviews</h1>
        <div class="total-reviews">
            <span class="label">Total reviews</span>
            <span class="count">320</span>
        </div>
    </header>

    <div class="columns-header">
        <div class="col-date">Posted date</div>
        <div class="col-review">Ratings & Reviews</div>
        <div class="col-user">Student | Username</div>
    </div>

    <div class="review-card">
        <div class="date-container col-date">
            April 07, 2026
        </div>

        <div class="review-content col-review">
         <div class="stars">★★★★★★</div>
            <p class="comment">“It met my needs and expectations exactly.”</p>
        </div>

        <div class="user-profile col-user">
            <span class="username">Leena Pfister</span>
            <div class="avatar"></div>
        </div>
    </div>

</div>

</body>
</html>
